version: 0.0

os: linux

file_exists_behavior: OVERWRITE

files:
  - source: /
    destination: /home/ec2-user/nodejs-app

permissions:
  - object: /home/ec2-user/nodejs-app
    pattern: "**"
    owner: ec2-user
    group: ec2-user
    mode: 755

hooks:

  ApplicationStop:
    - location: scripts/application_stop.sh
      timeout: 300
      runas: root

  BeforeInstall:
    - location: scripts/validate_environment.sh
      timeout: 300
      runas: root

    - location: scripts/before_install.sh
      timeout: 300
      runas: root

    - location: scripts/install_dependencies.sh
      timeout: 600
      runas: root

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 600
      runas: root

  ApplicationStart:
    - location: scripts/application_start.sh
      timeout: 300
      runas: ec2-user

  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 300
      runas: ec2-user